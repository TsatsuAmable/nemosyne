<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0f" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Mnemosyne symbol ◈ -->
  <text x="50" y="68" 
        font-family="serif" 
        font-size="55" 
        fill="url(#gold)" 
        text-anchor="middle" 
        filter="url(#glow)">◈</text>
  
  <!-- Subtle outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
</svg>