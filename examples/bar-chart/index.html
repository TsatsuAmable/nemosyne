<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemosyne — Bar Chart</title>
    
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="../../framework/dist/nemosyne.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; }
        .badge { background: rgba(212, 175, 55, 0.2); border: 1px solid #d4af37; color: #d4af37; padding: 4px 12px; border-radius: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 10px; }
        h1 { margin: 0 0 5px; font-size: 24px; font-weight: 300; }
        .subtitle { color: #888; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="badge">Bar Chart</div>
        <h1>Nemosyne</h1>
        <p class="subtitle">Monthly revenue visualization</p>
    </div>

    <a-scene nemosyne-scene="theme: void">
        
        <a-entity position="-8 2 8" rotation="0 -45 0">
            <a-camera look-controls wasd-controls="acceleration: 100">
                <a-cursor color="#d4af37" scale="0.5 0.5 0.5" raycaster="objects: .clickable"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Bar chart using custom positioning -->
        <nemosyne-artefact
            spec-inline='<;{
                "id": "revenue-bar",
                "geometry": { "type": "box" },
                "material": {
                    "properties": {
                        "color": { "$data": "value", "$map": "viridis" },
                        "emissive": { "$data": "value", "$map": "viridis" },
                        "emissiveIntensity": 0.3,
                        "metalness": 0.7,
                        "roughness": 0.3
                    }
                },
                "transform": {
                    "scale": { "$data": "value", "$range": [1, 5] }
                },
                "behaviours": [
                    { "trigger": "hover", "action": "glow", "params": { "intensity": 1.5 } },
                    { "trigger": "hover-leave", "action": "glow", "params": { "intensity": 0.3 } },
                    { "trigger": "click", "action": "scale", "params": { "factor": 1.1, "duration": 0.15 } },
                    { "trigger": "idle", "action": "rotate", "params": { "speed": 0.1, "axis": "y" } }
                ],
                "labels": {
                    "primary": { "$data": "month" },
                    "color": "#fff",
                    "position": "below"
                }
            }'
            data-inline='<;{
                "records": [
                    { "month": "Jan", "value": 45, "revenue": 45000 },
                    { "month": "Feb", "value": 52, "revenue": 52000 },
                    { "month": "Mar", "value": 38, "revenue": 38000 },
                    { "month": "Apr", "value": 65, "revenue": 65000 },
                    { "month": "May", "value": 78, "revenue": 78000 },
                    { "month": "Jun", "value": 92, "revenue": 92000 },
                    { "month": "Jul", "value": 85, "revenue": 85000 },
                    { "month": "Aug", "value": 73, "revenue": 73000 }
                ]
            }'>
        </nemosyne-artefact>

        <!-- Base platform -->
        <a-box 
            position="0 -0.1 -6" 
            width="25" 
            height="0.2" 
            depth="8" 
            color="#1a1a2e"
            material="roughness: 0.8">
        </a-box>

        <!-- Value markers on platform -->
        <a-entity id="markers">
            <a-text value="$0" position="-12 0.1 -1" align="center" color="#666" width="4"></a-text>
            <a-text value="$50K" position="-12 2 -1" align="center" color="#666" width="4"></a-text>
            <a-text value="$100K" position="-12 4 -1" align="center" color="#666" width="4"></a-text>

            <!-- Grid lines -->
            <a-entity line="start: -10 0 -10; end: 10 0 -10; color: #333"></a-entity>
            <a-entity line="start: -10 2 -10; end: 10 2 -10; color: #333"></a-entity>
            <a-entity line="start: -10 4 -10; end: 10 4 -10; color: #333"></a-entity>
        </a-entity>

        <a-sky color="#000205"></a-sky>

    </a-scene>

    <script>
        // Custom grid layout for bars
        const scene = document.querySelector('a-scene');
        scene.addEventListener('nemosyne-loaded', (e) => {
            const bars = document.querySelectorAll('.clickable');
            const spacing = 3;
            const startX = -((bars.length - 1) * spacing) / 2;
            
            bars.forEach((bar, i) => {
                const x = startX + i * spacing;
                const y = 0;
                const z = -6;
                bar.setAttribute('position', `${x} ${y} ${z}`);
            });
        });
    </script>

</body>
</html>
