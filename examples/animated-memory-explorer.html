<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Memory Explorer - MemPalace in VR</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/ammo.js"></script>

    <script src="../src/core/DataNativeEngine.js"></script>
    <script src="../src/animation/TemporalScrubber.js"></script>
    <script src="../src/animation/UncertaintyVisualizer.js"></script>
    <script src="../src/core/MemPalaceVRConnector.js"></script>
    <script src="../src/artefacts/nemosyne-scatter-semantic.js"></script>
    <script src="../src/artefacts/nemosyne-timeline-spiral.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #050510; }
        #ui {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,20,40,0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #00d4aa;
            color: #fff;
            text-align: center;
        }
        #scrubber-container {
            width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #time-display {
            font-family: monospace;
            font-size: 1.2em;
            color: #00d4aa;
        }
        #scrubber {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #1a1a2e;
            border-radius: 4px;
            outline: none;
        }
        #scrubber::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #00d4aa;
            border-radius: 50%;
            cursor: pointer;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            background: rgba(0,212,170,0.2);
            border: 1px solid #00d4aa;
            color: #00d4aa;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: rgba(0,212,170,0.4); }
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,20,40,0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00d4aa;
            color: #fff;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <h3>🧠 Animated Memory Explorer</h3>
        <p>Walk through time in your MemPalace</p>
        <ul style="text-align: left; font-size: 0.9em;">
            <li>📅 Drag slider to time-travel</li>
            <li>▶️ Watch memories appear over time</li>
            <li>✨ Uncertain data pulses/flickers</li>
            <li>🎯 Hover to see memory details</li>
        </ul>
    </div>

    <div id="ui">
        <div id="scrubber-container">
            <div id="time-display">Loading...</div>
            <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1">

            <div class="controls">
                <button onclick="skipBackward()">⏮ Prev</button>
                <button onclick="togglePlay()" id="play-btn">▶ Play</button>
                <button onclick="skipForward()">Next ⏭</button>
                <button onclick="toggleUncertainty()" id="uncertainty-btn">✨ Effects ON</button>
            </div>
        </div>
    </div>

    <a-scene background="color: #050510" fog="type: exponential; density: 0.015">
        <a-sky color="#050510"></a-sky>
        <a-light type="ambient" color="#1a1a2e" intensity="0.4"></a-light>
        <a-light type="point" color="#00d4aa" intensity="0.5" position="0 10 -10"></a-light>

        <a-entity id="camera-rig" position="0 1.6 -8">
            <a-camera look-controls wasd-controls="acceleration: 100">
                <a-cursor color="#00d4aa"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Time rings showing different eras -->
        <a-entity id="time-rings"></a-entity>

        <!-- Memory visualization -->
        <a-entity id="memory-viz" position="0 1.6 -5"></a-entity>

        <!-- Player hand for interaction -->
        <a-entity id="left-hand" hand-controls="hand: left" laser-controls></a-entity>
    </a-scene>

    <script>
        // Initialize systems
        let scrubber, connector, temporalScrubber, uncertaintyViz;
        let currentScene = null;
        let uncertaintyEnabled = true;

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize MemPalace connector
            connector = new MemPalaceVRConnector({
                baseUrl: 'http://localhost:8765'
            });

            // Initialize temporal scrubber
            temporalScrubber = new TemporalScrubber({
                playbackSpeed: 7 // Days per second
            });

            // Initialize uncertainty visualizer
            uncertaintyViz = new UncertaintyVisualizer(document.querySelector('a-scene'));

            // Setup UI
            setupUI();

            // Connect to MemPalace
            const connected = await connector.connect();

            if (connected) {
                // Load time-series data
                const loaded = await temporalScrubber.loadFromMemPalace(connector);

                if (loaded) {
                    const stats = temporalScrubber.getStats();
                    updateTimeDisplay(stats.startTime);

                    // Setup scrubber
                    setupScrubber(stats);

                    // Render initial state
                    renderTimeState(stats.startTime);

                    // Start listening for updates
                    temporalScrubber.addEventListener('time-update', (e) => {
                        updateTimeDisplay(new Date(e.detail.currentTime));
                        renderTimeState(e.detail.currentTime, e.detail.state);
                    });

                    // Create time rings
                    createTimeRings();
                }
            } else {
                document.getElementById('time-display').textContent = 'Using sample data (MemPalace unavailable)';
                loadSampleData();
            }
        });

        function setupUI() {
            const slider = document.getElementById('scrubber');

            slider.addEventListener('input', (e) => {
                const progress = e.target.value / 100;
                const range = temporalScrubber.timeRange.end - temporalScrubber.timeRange.start;
                const time = temporalScrubber.timeRange.start + (range * progress);

                temporalScrubber.scrubTo(time);
            });
        }

        function setupScrubber(stats) {
            const slider = document.getElementById('scrubber');
            const range = stats.endTime - stats.startTime;
            const duration = range / (24 * 60 * 60 * 1000); // days

            // Update display
            updateTimeDisplay(stats.startTime);
        }

        function updateTimeDisplay(time) {
            const display = document.getElementById('time-display');
            display.textContent = time.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function renderTimeState(timestamp) {
            const state = temporalScrubber.getStateAtTime(timestamp);
            if (!state) return;

            // Clear current
            const viz = document.getElementById('memory-viz');

            // Render memories up to this time
            const memories = state.nodes || [];

            memories.forEach((memory, i) => {
                if (!memory.position) return;

                const entity = document.createElement('a-sphere');
                entity.setAttribute('position', memory.position);

                // Size based on importance/age
                const age = (timestamp - memory.timestamp) / (24 * 60 * 60 * 1000); // days
                const size = 0.1 + (1 / (1 + age * 0.1)) * 0.2;
                entity.setAttribute('radius', size);

                // Color based on wing/category
                const colors = {
                    'projects': '#00d4aa',
                    'research': '#ff6b6b',
                    'conversations': '#4ecdc4',
                    'ideas': '#ffeaa7',
                    'tasks': '#a29bfe'
                };
                const color = colors[memory.wingId] || '#888888';

                entity.setAttribute('material', {
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.4
                });

                // Uncertainty effect for old memories
                if (uncertaintyEnabled && age > 180) { // 6+ months old
                    uncertaintyViz.visualizeUncertainty(entity, {
                        confidence: Math.max(0.2, 1 - age / 365),
                        type: 'pulse'
                    });
                }

                // Entrance animation based on when it appeared
                const appearsAt = memory.timestamp;
                const isNew = Math.abs(timestamp - appearsAt) < 24 * 60 * 60 * 1000;

                if (isNew) {
                    entity.setAttribute('scale', '0 0 0');
                    entity.setAttribute('animation', {
                        property: 'scale',
                        to: '1 1 1',
                        dur: 500,
                        easing: 'easeOutElastic'
                    });
                }

                entity.dataset.drawerId = memory.id;
                entity.dataset.timestamp = memory.timestamp;
                entity.classList.add('clickable');
                entity.classList.add('memory-point');

                entity.addEventListener('click', () => {
                    showMemoryDetail(memory);
                });

                viz.appendChild(entity);
            });

            // Limit displayed memories (performance)
            while (viz.children.length > 200) {
                viz.removeChild(viz.firstChild);
            }
        }

        function createTimeRings() {
            const rings = document.getElementById('time-rings');
            const stats = temporalScrubber.getStats();
            const duration = (stats.timeSpan) / (30 * 24 * 60 * 60 * 1000); // months

            for (let i = 1; i <= Math.min(12, duration); i++) {
                const ring = document.createElement('a-torus');
                const radius = i * 0.5;

                ring.setAttribute('radius', radius);
                ring.setAttribute('radius-tubular', 0.02);
                ring.setAttribute('rotation', { x: 90, y: 0, z: 0 });
                ring.setAttribute('material', {
                    color: '#00d4aa',
                    opacity: 0.1,
                    transparent: true
                });

                rings.appendChild(ring);
            }
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');

            if (temporalScrubber.state.isPlaying) {
                temporalScrubber.pause();
                btn.textContent = '▶ Play';
            } else {
                temporalScrubber.play();
                btn.textContent = '⏸ Pause';
            }
        }

        function skipBackward() {
            const prev = temporalScrubber.jumpToPreviousEvent();
            if (prev) {
                const progress = (prev - temporalScrubber.timeRange.start) /
                    (temporalScrubber.timeRange.end - temporalScrubber.timeRange.start);
                document.getElementById('scrubber').value = progress * 100;
            }
        }

        function skipForward() {
            const next = temporalScrubber.jumpToNextEvent();
            if (next) {
                const progress = (next - temporalScrubber.timeRange.start) /
                    (temporalScrubber.timeRange.end - temporalScrubber.timeRange.start);
                document.getElementById('scrubber').value = progress * 100;
            }
        }

        function toggleUncertainty() {
            uncertaintyEnabled = !uncertaintyEnabled;
            const btn = document.getElementById('uncertainty-btn');
            btn.textContent = uncertaintyEnabled ? '✨ Effects ON' : '✨ Effects OFF';

            // Re-render current state
            renderTimeState(temporalScrubber.timeRange.current);
        }

        function showMemoryDetail(memory) {
            console.log('Selected memory:', memory);
            // Could show a floating panel with full content
        }

        function loadSampleData() {
            // Generate sample temporal data
            const now = Date.now();
            const start = now - (6 * 30 * 24 * 60 * 60 * 1000); // 6 months ago

            for (let i = 0; i < 100; i++) {
                const t = start + (Math.random() * (now - start));

                temporalScrubber.addSnapshot(t, {
                    nodes: [{
                        id: `sample-${i}`,
                        wingId: ['projects', 'research', 'ideas'][Math.floor(Math.random() * 3)],
                        content: `Memory ${i}`,
                        timestamp: t,
                        position: {
                            x: (Math.random() - 0.5) * 10,
                            y: (Math.random() - 0.5) * 5,
                            z: (Math.random() - 0.5) * 10
                        }
                    }]
                });
            }

            // Initial render
            const stats = temporalScrubber.getStats();
            updateTimeDisplay(stats.startTime);
            setupScrubber(stats);
            renderTimeState(stats.startTime);
            createTimeRings();
        }
    </script>
</body>
</html>
