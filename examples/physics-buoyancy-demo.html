<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nemosyne Physics - Buoyancy Demo</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/ammo.js"></script>
  <script src="../src/physics/AmmoPhysicsEngine.js"></script>
  <script src="../src/physics/behaviours/physics-behaviours.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 8px;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      background: #00d4aa;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #00b894; }
    .water-level {
      margin: 10px 0;
    }
    input[type=range] { width: 200px; }
    .instructions { font-size: 12px; color: #aaa; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="ui">
    <h3>🌊 Buoyancy Demo</h3>
    
    <div class="water-level">
      <label>Water Level: <span id="level-value">0</span></label>
      <br>
      <input type="range" id="water-level" min="-5" max="5" value="0" step="0.5"
             oninput="updateWaterLevel(this.value)">
    </div>
    
    <button onclick="dropObjects()">🎲 Drop Objects</button>
    <button onclick="clearObjects()">🗑️ Clear</button>
    
    <p id="stats">Objects: 0</p>
    
    <p class="instructions">
      Objects float based on size/density.
      Adjust water level to see buoyancy effects.
      Uses Archimedes' principle!
    </p>
  </div>

  <a-scene physics="debug: false" background="color: #87CEEB">
    <!-- Lighting -->
    <a-entity light="type: ambient; color: #666"></a-entity>
    <a-entity light="type: directional; color: #fff; intensity: 0.9" position="-1 2 1"></a-entity>
    
    <!-- Water Surface -->
    <a-entity id="water-surface">
      <a-plane id="water" position="0 0 0" rotation="-90 0 0" 
               width="50" height="50"
               material="color: #006994; opacity: 0.6; transparent: true; metalness: 0.9; roughness: 0.1">
      </a-plane>
      <!-- Water caustics effect -->
      <a-circle position="0 0.01 0" rotation="-90 0 0" radius="25"
               material="color: #00ffff; opacity: 0.2; transparent: true; blending: additive"
               animation="property: material.opacity; from: 0.1; to: 0.3; dir: alternate; loop: true; dur: 2000">
      </a-circle>
    </a-entity>
    
    <!-- Underwater zone indicator -->
    <a-box id="underwater-zone" position="0 -10 0" width="50" height="20" depth="50"
           material="color: #003d5c; opacity: 0.3; transparent: true">
    </a-box>
    
    <!-- Container -->
    <a-entity id="object-container"></a-entity>
    
    <!-- Camera -->
    <a-entity position="0 8 20">
      <a-camera look-controls wasd-controls>
        <a-cursor color="#00d4aa" scale="0.5 0.5 0.5"></a-cursor>
      </a-camera>
    </a-entity>
  </a-scene>

  <script>
    let physics;
    let buoyancy;
    let objects = [];
    const container = document.getElementById('object-container');
    const statsEl = document.getElementById('stats');
    let waterLevel = 0;

    async function initPhysics() {
      if (typeof Ammo === 'function') {
        await Ammo();
      }

      // Create physics with gravity
      physics = new AmmoPhysicsEngine({
        gravity: { x: 0, y: -9.81, z: 0 },
        timeStep: 1 / 60,
        maxSubSteps: 10
      });

      await physics.init();
      console.log('[Buoyancy Demo] Physics initialized');

      // Create buoyancy behaviour
      buoyancy = new BuoyancyBehaviour(null, physics, {
        fluidLevel: waterLevel,
        density: 1.0,
        drag: 0.3
      });
      buoyancy.attach();

      startSimulation();
    }

    function updateWaterLevel(level) {
      waterLevel = parseFloat(level);
      document.getElementById('level-value').textContent = waterLevel;
      
      // Update water plane position
      const water = document.getElementById('water');
      water.setAttribute('position', `0 ${waterLevel} 0`);
      
      // Update buoyancy
      if (buoyancy) {
        buoyancy.fluidLevel = waterLevel;
        buoyancy.detach();
        buoyancy.attach();
      }
    }

    function dropObjects() {
      // Create random objects
      for (let i = 0; i < 10; i++) {
        createFloatingObject();
      }
      updateStats();
    }

    function createFloatingObject() {
      const id = `obj-${Date.now()}-${Math.random()}`;
      const x = (Math.random() - 0.5) * 15;
      const z = (Math.random() - 0.5) * 15;
      const y = 8 + Math.random() * 4;
      
      // Vary size (affects buoyancy)
      const size = 0.2 + Math.random() * 0.4;
      const mass = size * size * size * 2; // Mass proportional to volume
      
      // Create physics body
      const body = physics.createNodeBody(id, { x, y, z }, {
        mass: mass,
        radius: size,
        restitution: 0.3,
        friction: 0.5,
        linearDamping: 0.5
      });
      
      // Random shape
      const shapes = ['box', 'sphere', 'cylinder'];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      
      // Color based on size (smaller = lighter color)
      const hue = 180 + (size * 100); // Cyan to blue
      const color = `hsl(${hue}, 70%, 60%)`;
      
      // Create visual
      let entity;
      switch(shape) {
        case 'box':
          entity = document.createElement('a-box');
          entity.setAttribute('width', size * 2);
          entity.setAttribute('height', size * 2);
          entity.setAttribute('depth', size * 2);
          break;
        case 'sphere':
          entity = document.createElement('a-sphere');
          entity.setAttribute('radius', size);
          break;
        case 'cylinder':
          entity = document.createElement('a-cylinder');
          entity.setAttribute('radius', size);
          entity.setAttribute('height', size * 2);
          break;
      }
      
      entity.setAttribute('position', { x, y, z });
      entity.setAttribute('color', color);
      entity.setAttribute('material', {
        metalness: 0.6,
        roughness: 0.3,
        transparent: true,
        opacity: 0.9
      });
      entity.dataset.nodeId = id;
      
      // Add bobbing animation for visual interest
      if (Math.random() > 0.5) {
        entity.setAttribute('animation__rotate', {
          property: 'rotation',
          to: `${Math.random() * 360} ${Math.random() * 360} ${Math.random() * 360}`,
          dur: 5000 + Math.random() * 5000,
          loop: true
        });
      }
      
      container.appendChild(entity);
      objects.push({ id, entity, body, size });
    }

    function clearObjects() {
      // Remove from physics
      objects.forEach(obj => {
        physics.removeBody(obj.id);
        obj.entity.remove();
      });
      
      objects = [];
      updateStats();
    }

    function updateStats() {
      statsEl.textContent = `Objects: ${objects.length}`;
    }

    function startSimulation() {
      function update() {
        if (!physics?.ready) {
          requestAnimationFrame(update);
          return;
        }

        // Step physics
        physics.stepSimulation(1/60);
        
        // Update buoyancy
        buoyancy.applyBuoyancy();

        // Sync visuals
        objects.forEach(obj => {
          const pos = physics.getBodyPosition(obj.id);
          if (pos) {
            obj.entity.setAttribute('position', pos);
            
            // Fade out far below water
            if (pos.y < waterLevel - 10) {
              obj.entity.setAttribute('visible', false);
            }
          }
        });

        requestAnimationFrame(update);
      }
      
      requestAnimationFrame(update);
    }

    // Start
    initPhysics().catch(console.error);
  </script>
</body>
</html>
