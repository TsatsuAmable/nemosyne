<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemosyne Crystal — The Atomic Unit</title>
    
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Nemosyne Crystal (would be bundled in production) -->
    <script src="../framework/src/components/nemosyne-crystal.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 20px;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid #00d4aa;
            border-radius: 8px;
            color: #fff;
            max-width: 350px;
            z-index: 100;
        }
        
        #info-panel h1 {
            margin: 0 0 10px;
            font-size: 20px;
            color: #00d4aa;
            font-weight: 300;
        }
        
        #info-panel p {
            margin: 5px 0;
            font-size: 13px;
            color: #ccc;
            line-height: 1.5;
        }
        
        #info-panel code {
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #00d4aa;
        }
        
        .controls {
            margin-top: 15px;
        }
        
        button {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 16px;
            margin: 5px 5px 5px 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        button:hover {
            border-color: #00d4aa;
            color: #fff;
        }
        
        button.primary {
            background: rgba(0, 212, 170, 0.2);
            border-color: #00d4aa;
            color: #00d4aa;
        }
        
        #value-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 15px 20px;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid #6b4ee6;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
        }
        
        #value-display span {
            color: #6b4ee6;
            font-size: 12px;
            font-weight: normal;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <!-- Info Panel -->
    <div id="info-panel">
        <h1>🐾 Nemosyne Crystal</h1>
        <p>The atomic unit of Nemosyne</p>
        
        <p><strong>A-Frame:</strong> Renders VR geometry</p>
        <p><strong>D3.js:</strong> Scales value → size/color</p>
        
        <div class="controls">
            <p><strong>Try it:</strong></p>
            <button onclick="setValue(10)">Value: 10 (Small)</button>
            <button onclick="setValue(50)">Value: 50 (Medium)</button>
            <button class="primary" onclick="setValue(95)">Value: 95 (Large)</button>
            <button onclick="randomize()">🎲 Randomize</button>
        </div>
    </div>
    
    <!-- Value Display -->
    <div id="value-display">
        42
        <span>Current Value</span>
    </div>

    <!-- VR Scene -->
    <a-scene>
        
        <!-- Camera -->
        <a-entity position="0 1.6 5">
            <a-camera look-controls wasd-controls="acceleration:50">
                <a-cursor 
                    color="#00d4aa"
                    scale="0.5 0.5 0.5"
                    raycaster="objects: .crystal"
                ></a-cursor>
            </a-camera>
        </a-entity>
        
        <!-- The Nemosyne Crystal -->
        <a-entity
            id="crystal"
            nemosyne-crystal="
                value: 42;
                geometry: octahedron;
                color: #00d4aa;
                emissive: #00d4aa;
                emissiveIntensity: 0.5;
                scaleDomain: [0, 100];
                scaleRange: [0.5, 2.5];
                colourScale: viridis;
                behaviours: hover, click, idle, data-change
            "
            class="crystal"
            position="0 1.6 0"
        ></a-entity>
        
        <!-- Ground -->
        <a-plane
            rotation="-90 0 0"
            width="20"
            height="20"
            color="#0a0a0f"
            material="roughness:0.9; metalness:0.1"
        ></a-plane>
        
        <!-- Lights -->
        <a-light type="ambient" color="#111" intensity="0.3"></a-light>
        <a-light 
            type="point" 
            position="2 4 4" 
            intensity="1.5"
            color="#ffffff"
        ></a-light>
        
        <a-light 
            type="point" 
            position="-2 3 -2" 
            intensity="0.5"
            color="#00d4aa"
        ></a-light>

        <!-- Background -->
        <a-sky color="#000205"></a-sky>
        
    </a-scene>

    <script>
        // Get crystal reference
        const crystal = document.querySelector('#crystal');
        
        // Display element
        const display = document.getElementById('value-display');
        
        // Set value from button
        function setValue(value) {
            if (crystal && crystal.components['nemosyne-crystal']) {
                crystal.components['nemosyne-crystal'].setValue(value);
                display.innerHTML = `${value} <span>Current Value</span>`;
            }
        }
        
        // Randomize
        function randomize() {
            const value = Math.floor(Math.random() * 90) + 10;
            setValue(value);
        }
        
        // Listen to events
        crystal.addEventListener('hover', (e) => {
            console.log('Crystal hovered:', e.detail);
        });
        
        crystal.addEventListener('click', (e) => {
            console.log('Crystal clicked:', e.detail);
        });
        
        crystal.addEventListener('data-change', (e) => {
            console.log(`Value changed: ${e.detail.oldValue} → ${e.detail.newValue}`);
        });
        
        // An initial demo
        setTimeout(() => {
            // Demonstrate the D3 → A-Frame binding
            console.log('Crystal initialized with D3 scales:');
            console.log('  Domain:', crystal.getAttribute('nemosyne-crystal').scaleDomain);
            console.log('  Range:', crystal.getAttribute('nemosyne-crystal').scaleRange);
            console.log('  Colour scale:', crystal.getAttribute('nemosyne-crystal').colourScale);
        }, 1000);
    </script>

</body>
</html>
