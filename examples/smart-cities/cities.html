<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemosyne — Smart Cities</title>
    
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="../../dist/nemosyne.iife.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; }
        .badge { background: rgba(0, 212, 170, 0.2); border: 1px solid #00d4aa; color: #00d4aa; padding: 4px 12px; border-radius: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 10px; }
        h1 { margin: 0 0 5px; font-size: 24px; font-weight: 300; }
        .subtitle { color: #888; font-size: 14px; }
        .controls { margin-top: 20px; font-size: 12px; color: #666; }
        .legend { display: flex; gap: 15px; margin-top: 10px; font-size: 11px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .swatch { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="badge">Smart Cities</div>
        <h1>Urban Data Viz</h1>
        <p class="subtitle">Live traffic, air quality, and energy</p>
        
        <div class="legend">
            <div class="legend-item"><div class="swatch" style="background:#00d4aa;"></div> Good AQ</div>
            <div class="legend-item"><div class="swatch" style="background:#ffaa00;"></div> Moderate AQ</div>
            <div class="legend-item"><div class="swatch" style="background:#ff3864;"></div> Poor AQ</div>
        </div>
        
        <div class="controls">
            Click buildings for details | Traffic arteries = thickness
        </div>
    </div>

    <a-scene nemosyne-scene="theme: void">
        
        <a-entity position="15 15 25" rotation="-45 0 0">
            <a-camera look-controls wasd-controls="acceleration: 200">
                <a-cursor color="#00d4aa" scale="0.5 0.5 0.5" raycaster="objects: .clickable"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- City Blocks -->
        <a-entity
            id="buildings"
            nemosyne-artefact-v2='<;{
                "spec": {
                    "id": "building",
                    "geometry": { "type": "box" },
                    "material": {
                        "properties": {
                            "color": { "$data": "type", "$map": "category10" },
                            "emissive": "#00d4aa",
                            "emissiveIntensity": 0.1,
                            "metalness": 0.5,
                            "roughness": 0.8,
                            "opacity": 0.95,
                            "transparent": true
                        }
                    },
                    "transform": {
                        "scale": { "$data": "height", "$range": [0.5, 4] }
                    },
                    "behaviours": [
                        { "trigger": "hover", "action": "glow", "params": { "intensity": 0.8 } },
                        { "trigger": "click", "action": "scale", "params": { "factor": 1.05, "duration": 0.2 } }
                    ],
                    "labels": {
                        "primary": { "$data": "name" },
                        "color": "#fff",
                        "position": "above"
                    }
                },
                "dataset": {},
                "layout": "grid",
                "layout-options": { "columns": 4, "spacing": 6 }
            }'
        ></a-entity>

        <!-- Air Quality Plumes -->
        <a-entity
            id="aq-sensors"
            nemosyne-artefact-v2='<;{
                "spec": {
                    "id": "aq-plume",
                    "geometry": { "type": "cylinder", "radius": 0.8 },
                    "material": {
                        "properties": {
                            "color": { "$data": "aqi_level", "$map": "diverging-rdgy" },
                            "emissive": { "$data": "aqi_level", "$map": "diverging-rdgy" },
                            "emissiveIntensity": 0.3,
                            "transparent": true,
                            "opacity": 0.4
                        }
                    },
                    "transform": {
                        "scale": { "$data": "aqi", "$range": [1, 3] }
                    },
                    "behaviours": [
                        { "trigger": "hover", "action": "glow", "params": { "intensity": 1 } },
                        { "trigger": "idle", "action": "rotate", "params": { "speed": 0.2 } }
                    ]
                },
                "dataset": {}
            }'
        ></a-entity>

        <!-- Traffic Flow Lines -->
        <a-entity id="traffic-flows"></a-entity>

        <!-- City Grid Base -->
        <a-plane rotation="-90 0 0" width="30" height="30" color="#0a0a0f" 
            material="roughness:0.9; metalness:0.1"></a-plane>

        <!-- Street Grid -->
        <a-entity id="streets"></a-entity>

        <a-sky color="#000205"></a-sky>

    </a-scene>

    <script>
        // City data
        const cityData = {
            buildings: [
                { id: 'b1', name: 'Tech Tower', type: 0, height: 4.0, occupancy: 0.92, energy: 1250, x: -10, z: -10 },
                { id: 'b2', name: 'Office Hub', type: 1, height: 3.2, occupancy: 0.78, energy: 980, x: -10, z: -5 },
                { id: 'b3', name: 'Residence A', type: 2, height: 2.5, occupancy: 0.85, energy: 650, x: -10, z: 0 },
                { id: 'b4', name: 'Residence B', type: 2, height: 2.8, occupancy: 0.88, energy: 720, x: -10, z: 5 },
                { id: 'b5', name: 'Shopping Mall', type: 3, height: 1.8, occupancy: 0.95, energy: 1500, x: -5, z: -10 },
                { id: 'b6', name: 'Hospital', type: 4, height: 2.2, occupancy: 0.90, energy: 2000, x: -5, z: -5 },
                { id: 'b7', name: 'School', type: 4, height: 1.5, occupancy: 0.75, energy: 800, x: -5, z: 0 },
                { id: 'b8', name: 'Fire Station', type: 4, height: 1.2, occupancy: 0.60, energy: 400, x: -5, z: 5 },
                { id: 'b9', name: 'Factory A', type: 0, height: 3.5, occupancy: 0.80, energy: 3000, x: 0, z: -10 },
                { id: 'b10', name: 'Factory B', type: 0, height: 3.0, occupancy: 0.70, energy: 2500, x: 0, z: -5 },
                { id: 'b11', name: 'Warehouse', type: 1, height: 1.0, occupancy: 0.50, energy: 600, x: 0, z: 0 },
                { id: 'b12', name: 'Parking', type: 3, height: 0.3, occupancy: 0.40, energy: 200, x: 0, z: 5 }
            ],
            
            airQuality: [
                { id: 'aq1', aqi: 45, aqi_level: 1, pm25: 12, no2: 28 },   // Good
                { id: 'aq2', aqi: 85, aqi_level: 0.5, pm25: 35, no2: 45 }, // Moderate
                { id: 'aq3', aqi: 120, aqi_level: 0, pm25: 55, no2: 65 }, // Poor
                { id: 'aq4', aqi: 65, aqi_level: 0.8, pm25: 25, no2: 38 }, // Moderate
                { id: 'aq5', aqi: 35, aqi_level: 1, pm25: 8, no2: 20 }     // Good
            ]
        };

        // Initialize buildings
        const buildingsEl = document.querySelector('#buildings');
        if (buildingsEl) {
            buildingsEl.setAttribute('nemosyne-artefact-v2', 'dataset', JSON.stringify({ records: cityData.buildings }));
        }

        // Initialize air quality
        const aqEl = document.querySelector('#aq-sensors');
        if (aqEl) {
            aqEl.setAttribute('nemosyne-artefact-v2', 'dataset', JSON.stringify({ records: cityData.airQuality }));
        }

        // Position after load
        setTimeout(() => {
            // Position buildings
            const buildingNodes = buildingsEl?.querySelectorAll('.clickable') || [];
            buildingNodes.forEach((node, i) => {
                const b = cityData.buildings[i];
                if (b) {
                    node.setAttribute('position', `${b.x} 0 ${b.z}`);
                    
                    // Add click handler
                    node.addEventListener('click', () => {
                        const label = node.querySelector('a-text');
                        if (label) {
                            label.setAttribute('value', 
                                `${b.name}\n` +
                                `Occupancy: ${(b.occupancy * 100).toFixed(0)}%\n` +
                                `Energy: ${b.energy} kW\n` +
                                `Height: ${b.height * 30}m`
                            );
                            label.setAttribute('visible', true);
                            setTimeout(() => label.setAttribute('visible', false), 5000);
                        }
                    });
                }
            });

            // Position AQ sensors
            const aqNodes = aqEl?.querySelectorAll('.clickable') || [];
            aqNodes.forEach((node, i) => {
                const aq = cityData.airQuality[i];
                if (aq) {
                    // Place near buildings
                    const b = cityData.buildings[i % cityData.buildings.length];
                    node.setAttribute('position', `${b.x + 3} 0 ${b.z + 3}`);
                    node.setAttribute('rotation', '0 0 0');
                }
            });

            // Create traffic flows
            const streetContainer = document.querySelector('#traffic-flows');
            const mainRoads = [
                { start: [-15, 0, 0], end: [15, 0, 0], volume: 0.8 },
                { start: [0, 0, -15], end: [0, 0, 15], volume: 0.9 },
                { start: [-10, 0, -10], end: [10, 0, 10], volume: 0.5 }
            ];

            mainRoads.forEach((road, i) => {
                const flow = document.createElement('a-entity');
                const dist = Math.sqrt(
                    Math.pow(road.end[0] - road.start[0], 2) +
                    Math.pow(road.end[2] - road.start[2], 2)
                );
                
                flow.setAttribute('geometry', {
                    primitive: 'cylinder',
                    radius: road.volume * 0.3,
                    height: dist
                });
                
                flow.setAttribute('material', {
                    color: '#ffaa00',
                    transparent: true,
                    opacity: 0.4,
                    emissive: '#ffaa00',
                    emissiveIntensity: 0.2
                });

                const midX = (road.start[0] + road.end[0]) / 2;
                const midZ = (road.start[2] + road.end[2]) / 2;
                flow.setAttribute('position', `${midX} 0.1 ${midZ}`);
                
                // Orient
                const angle = Math.atan2(road.end[0] - road.start[0], road.end[2] - road.start[2]);
                flow.setAttribute('rotation', `0 ${(angle * 180 / Math.PI) - 90} 0`);
                
                // Animation
                flow.setAttribute('animation', {
                    property: 'material.emissiveIntensity',
                    from: 0.2,
                    to: 0.5,
                    dur: 1000 / road.volume,
                    loop: true,
                    dir: 'alternate',
                    easing: 'easeInOutSine'
                });
                
                streetContainer.appendChild(flow);
            });

            // Animate traffic data
            setInterval(() => {
                cityData.airQuality.forEach(aq => {
                    aq.aqi += (Math.random() - 0.5) * 10;
                    aq.aqi = Math.max(20, Math.min(150, aq.aqi));
                    aq.aqi_level = 1 - (aq.aqi / 150); // 1 = good, 0 = poor
                });

                // Update visualization
                if (aqEl) {
                    aqEl.setAttribute('nemosyne-artefact-v2', 'dataset', JSON.stringify({ 
                        records: cityData.airQuality 
                    }));
                }
            }, 3000);
        }, 1500);
    </script>

</body>
</html>
