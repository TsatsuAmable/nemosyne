<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemosyne — Hello World</title>
    
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    
    <!-- Nemosyne Framework -->
    <script src="../../dist/nemosyne.iife.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        .badge {
            background: rgba(0, 212, 170, 0.2);
            border: 1px solid #00d4aa;
            color: #00d4aa;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 10px;
        }
        h1 {
            margin: 0 0 5px;
            font-size: 24px;
            font-weight: 300;
            color: #fff;
        }
        .subtitle { color: #888; font-size: 14px; margin: 0; }
        .controls {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        kbd {
            background: #222;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div class="badge">Hello World</div>
        <h1>Nemosyne</h1>
        <p class="subtitle">Your first VR data artefact</p>
        <div class="controls">
            <p><kbd>WASD</kbd> move <kbd>Mouse</kbd> look <kbd>Click</kbd> interact</p>
        </div>
    </div>

    <a-scene nemosyne-scene="theme: void">
        <!-- Camera -->
        <a-entity position="0 1.6 4">
            <a-camera look-controls wasd-controls="acceleration: 100">
                <a-cursor 
                    color="#00d4aa" 
                    scale="0.5 0.5 0.5"
                    animation__click="property: scale; startEvents: click; to: 0.1 0.1 0.1; dur: 100"
                    animation__release="property: scale; startEvents: mouseup; to: 0.5 0.5 0.5; dur: 100"
                    raycaster="objects: .clickable">
                </a-cursor>
            </a-camera>
        </a-entity>

        <!-- The Crystal Artefact -->
        <nemosyne-artefact
            spec-inline='<;{
                "id": "hello-crystal",
                "geometry": { "type": "octahedron", "radius": 1 },
                "material": {
                    "shader": "standard",
                    "properties": {
                        "color": "#00d4aa",
                        "emissive": "#00d4aa",
                        "emissiveIntensity": 0.5,
                        "metalness": 0.8,
                        "roughness": 0.2
                    }
                },
                "transform": {
                    "scale": { "$data": "value", "$range": [0.8, 1.2] }
                },
                "behaviours": [
                    { "trigger": "hover", "action": "glow", "params": { "intensity": 2 } },
                    { "trigger": "hover-leave", "action": "glow", "params": { "intensity": 0.5 } },
                    { "trigger": "click", "action": "scale", "params": { "factor": 1.3, "duration": 0.2 } },
                    { "trigger": "idle", "action": "rotate", "params": { "speed": 0.5, "axis": "y" } }
                ],
                "labels": {
                    "primary": { "$data": "label" },
                    "color": "#d4af37",
                    "position": "above"
                }
            }'
            data-inline='<;{
                "records": [
                    { "value": 42, "label": "Hello World" }
                ]
            }'>
        </nemosyne-artefact>

        <!-- Ground plane -->
        <a-plane 
            rotation="-90 0 0" 
            width="50" 
            height="50" 
            color="#0a0a0f"
            roughness="0.9"
            metalness="0.1">
        </a-plane>

        <!-- Grid helper (optional visual aid) -->
        <a-entity id="grid"
            geometry="primitive: plane; width: 20; height: 20"
            material="src: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==); repeat: 20 20; transparent: true; opacity: 0.1"
            rotation="-90 0 0"
            position="0 0.01 0">
        </a-entity>

    </a-scene>

    <script>
        // Listen for load event
        document.querySelector('a-scene').addEventListener('nemosyne-loaded', (e) => {
            console.log('Nemosyne loaded with', e.detail.count, 'artefacts');
        });
    </script>

</body>
</html>
