<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemosyne — Virtual Worlds / Game Dev</title>
    
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="../../dist/nemosyne.iife.js"></script>
    <script src="../../extensions/game-worlds/index.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 100; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; justify-content: space-between; }
        .badge { background: rgba(107, 78, 230, 0.2); border: 1px solid #6b4ee6; color: #6b4ee6; padding: 4px 12px; border-radius: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { margin: 0 0 5px; font-size: 24px; font-weight: 300; }
        .subtitle { color: #888; font-size: 14px; }
        .perf-stats { text-align: right; }
        .controls { margin-top: 10px; font-size: 11px; color: #666; }
        kbd { background: #222; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
        .mode-indicator { color: #6b4ee6; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ui">
        <div>
            <span class="badge">Virtual Worlds</span>
            <h1>Level Editor + Profiler</h1>
            <p class="subtitle">NavMesh, Spawn Points, Performance Heatmap</p>
            <div class="controls">
                <p>Mode: <span id="current-mode" class="mode-indicator">Normal</span> | 
                <kbd>N</kbd> NavMesh | <kbd>S</kbd> Spawns | 
                <kbd>P</kbd> Profiler | <kbd>T</kbd> Test NPC</p>
            </div>
        </div>
        
        <div class="perf-stats">
            <p class="subtitle">FPS: <span id="fps-counter">60</span> | 
            Draws: <span id="draw-calls">--</span> | 
            Tris: <span id="tri-count">--</span> M</p>
            <p class="subtitle">Frame: <span id="frame-time">16</span> ms | 
            Entities: <span id="entity-count">--</span></p>
        </div>
    </div>

    <a-scene nemosyne-scene="theme: void">
        
        <a-entity position="0 8 20" rotation="-30 0 0">
            <a-camera look-controls wasd-controls="acceleration: 150">
                <a-cursor color="#6b4ee6" scale="0.5 0.5 0.5" raycaster="objects: .clickable"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Level Geometry (Simplified Arena) -->
        <a-entity id="level-geometry">
            <!-- Ground -->
            <a-plane rotation="-90 0 0" width="50" height="50" color="#1a1a2f" 
                material="roughness: 0.9; metalness: 0.1" class="navmesh-walkable"
            ></a-plane>
            
            <!-- Walls/Obstacles -->
            <a-box position="-10 2.5 -10" width="5" height="5" depth="5" color="#2a2a4f" class="obstacle"></a-box>
            <a-box position="10 2.5 -5" width="5" height="5" depth="5" color="#2a2a4f" class="obstacle"></a-box>
            <a-box position="0 1.5 10" width="8" height="3" depth="4" color="#2a2a4f" class="obstacle"></a-box>
            
            <!-- Elevated platform -->
            <a-box position="-15 1 -15" width="8" height="2" depth="8" color="#3a3a5f" class="navmesh-walkable"></a-box>
            <a-box position="15 0.5 15" width="10" height="1" depth="10" color="#3a3a5f" class="navmesh-walkable"
003e</a-box>
            
            <!-- Ramp -->
            <a-box position="-15 1 -15" width="6" height="0.2" depth="4" color="#4a4a7f" 
                rotation="0 0 -15" class="navmesh-walkable"
            ></a-box>
            
            <!-- Cover points -->
            <a-box position="-5 1 -15" width="2" height="2" depth="2" color="#5a5a8f" class="cover"
                animation="property: position.y; dir: alternate; to: 1.5; dur: 2000; loop: true"
            ></a-box>
            
            <a-box position="5 1 -12" width="2" height="2" depth="2" color="#5a5a8f" class="cover"
                animation="property: position.y; dir: alternate; to: 1.5; dur: 2500; loop: true"
            ></a-box>
        </a-entity>

        <!-- Spawn Points -->
        <a-entity id="spawn-points">
            <!-- Enemy spawns -->
            <a-entity id="spawn-enemy-1" position="-20 0 0" class="spawn-point"
003e
                <a-octahedron radius="0.5" color="#ff3864" opacity="0.6"
                    material="emissive: #ff3864; emissiveIntensity: 0.5"
                    animation="property: rotation; to: 0 360 0; dur: 2000; loop: true"
                    class="clickable"
                ></a-octahedron>
                <a-text value="Enemy Spawn 1" align="center" width="4" color="#ff3864" position="0 1 0"></a-text>
            </a-entity>
            
            <a-entity id="spawn-enemy-2" position="20 0 0" class="spawn-point">
                <a-octahedron radius="0.5" color="#ff3864" opacity="0.6"
                    material="emissive: #ff3864; emissiveIntensity: 0.5"
                    animation="property: rotation; to: 0 360 0; dur: 2000; loop: true"
                    class="clickable"
                ></a-octahedron>
                <a-text value="Enemy Spawn 2" align="center" width="4" color="#ff3864" position="0 1 0"></a-text>
            </a-entity>
            
            <a-entity id="spawn-enemy-3" position="0 0 -20" class="spawn-point">
                <a-octahedron radius="0.5" color="#ff3864" opacity="0.6"
                    material="emissive: #ff3864; emissiveIntensity: 0.5"
                    animation="property: rotation; to: 0 360 0; dur: 2000; loop: true"
                    class="clickable"
                ></a-octahedron>
                <a-text value="Enemy Spawn 3" align="center" width="4" color="#ff3864" position="0 1 0"></a-text>
            </a-entity>
            
            <!-- Player spawn -->
            <a-entity id="spawn-player" position="0 0 0" class="spawn-point">
                <a-sphere radius="0.5" color="#00d4aa" opacity="0.6"
                    material="emissive: #00d4aa; emissiveIntensity: 0.5"
                    animation="property: scale; dir: alternate; to: 1.2 1.2 1.2; dur: 1000; loop: true"
                    class="clickable"
                ></a-sphere>
                <a-text value="Player Spawn" align="center" width="4" color="#00d4aa" position="0 1 0"></a-text>
            </a-entity>
            
            <!-- Loot/Objective points -->
            <a-entity id="loot-1" position="-10 0.5 10" class="loot-point">
                <a-box width="0.4" height="0.4" depth="0.4" color="#d4af37" opacity="0.8"
                    material="emissive: #d4af37; emissiveIntensity: 0.3"
                    animation="property: rotation; to: 0 360 0; dur: 3000; loop: true"
                    class="clickable"
                ></a-box>
                <a-text value="Loot Cache" align="center" width="4" color="#d4af37" position="0 0.6 0"></a-text>
            </a-entity>
            
            <a-entity id="loot-2" position="10 0.5 10" class="loot-point">
                <a-box width="0.4" height="0.4" depth="0.4" color="#d4af37" opacity="0.8"
                    material="emissive: #d4af37; emissiveIntensity: 0.3"
                    animation="property: rotation; to: 0 360 0; dur: 3000; loop: true"
                    class="clickable"
                ></a-box>
                <a-text value="Ammo Box" align="center" width="4" color="#d4af37" position="0 0.6 0"></a-text>
            </a-entity>
        </a-entity>

        <!-- NavMesh Visualization (wireframe) -->
        <a-entity id="navmesh-overlay" visible="false"></a-entity>

        <!-- Patrol Paths -->
        <a-entity id="patrol-paths" visible="false">
            <!-- Path 1 -->
            <a-entity
                nemosyne-artefact-v2='{
                    "spec": {
                        "id": "patrol-node",
                        "geometry": { "type": "sphere", "radius": 0.2 },
                        "material": {
                            "properties": {
                                "color": "#6b4ee6",
                                "emissive": "#6b4ee6",
                                "emissiveIntensity": 0.8
                            }
                        },
                        "behaviours": [
                            { "trigger": "idle", "action": "rotate", "params": { "speed": 2 } }
                        ]
                    },
                    "dataset": {
                        "records": [
                            { "id": "p1-1" }, { "id": "p1-2" }, { "id": "p1-3" }, { "id": "p1-4" }
                        ]
                    },
                    "layout": "scatter"
                }'
            ></a-entity>
        </a-entity>

        <!-- Performance Profiler Overlay -->
        <a-entity id="profiler-overlay" position="0 12 0" visible="false">            
            <!-- FPS Meter -->
            <a-entity id="fps-meter" position="-10 0 0">                <a-plane width="3" height="4" color="#0a0a0f" opacity="0.9" material="shader: flat"></a-plane>                
                <a-text value="FPS" align="center" width="4" color="#fff" position="0 1.5 0.1"></a-text>                
                <a-text id="fps-value" value="60" align="center" width="10" color="#00d4aa" position="0 0 0.1"></a-text>
                
                <a-cylinder radius="0.1" height="2" color="#00d4aa" position="0 -1 0.1" 
                    id="fps-bar"
                    material="opacity: 0.5; transparent: true"
                ></a-cylinder>
            </a-entity>
            
            <!-- Draw Call Meter -->
            <a-entity id="draw-meter" position="-5 0 0">                <a-plane width="3" height="4" color="#0a0a0f" opacity="0.9" material="shader: flat"></a-plane>                
                <a-text value="Draw Calls" align="center" width="4" color="#fff" position="0 1.5 0.1"></a-text>                
                <a-text id="draw-value" value="45" align="center" width="6" color="#ffaa00" position="0 0 0.1"></a-text>
            </a-entity>
            
            <!-- Triangle Meter -->
            <a-entity id="tri-meter" position="0 0 0">                <a-plane width="3" height="4" color="#0a0a0f" opacity="0.9" material="shader: flat"></a-plane>                
                <a-text value="Triangles" align="center" width="4" color="#fff" position="0 1.5 0.1"></a-text>                
                <a-text id="tri-value" value="0.5M" align="center" width="6" color="#6b4ee6" position="0 0 0.1"></a-text>
            </a-entity>
            
            
            <!-- Frame Time -->
            <a-entity id="frame-meter" position="5 0 0">                <a-plane width="3" height="4" color="#0a0a0f" opacity="0.9" material="shader: flat"></a-plane>                
                <a-text value="Frame Time" align="center" width="4" color="#fff" position="0 1.5 0.1"></a-text>                
                <a-text id="frame-value" value="16.7ms" align="center" width="6" color="#ff3864" position="0 0 0.1"></a-text>
            </a-entity>
        </a-entity>

        <!-- Entity Component System Visualizer -->
        <a-entity id="ecs-visualizer" position="0 4 -10" visible="false">            
            <a-plane width="15" height="10" color="#0a0a0f" opacity="0.95" material="shader: flat"></a-plane>            
            
            <a-text value="Entity Component System" align="center" width="6" color="#fff" position="0 4 0.1"></a-text>            
            
            <!-- Component list -->
            <a-entity position="-6 2 0">                <a-text value="Components:" align="left" width="4" color="#6b4ee6" position="0 0 0.1"></a-text>                
                <a-text value="Transform (5)\nMeshRenderer (5)\nCollider (3)\nRigidbody (2)\nAIAgent (3)" align="left" width="3" color="#888" position="0 -1 0.1"></a-text>            </a-entity>            
            
            <!-- Entity list --
            <a-entity position="0 2 0">                <a-text value="Entities:" align="left" width="4" color="#00d4aa" position="0 0 0.1"></a-text>                
                <a-text value="Player [T,MR,C,R]\nEnemy1 [T,MR,C,AI]\nEnemy2 [T,MR,C,AI]\nEnemy3 [T,MR,AI]\nLootBox [T,MR,C]" align="left" width="3" color="#888" position="0 -1.2 0.1"></a-text>            </a-entity>            
            
            
            <!-- Systems list --
003e
            <a-entity position="4 2 0">                <a-text value="Systems:" align="left" width="4" color="#ffaa00" position="0 0 0.1"></a-text>                
                <a-text value="MovementSystem\nRenderSystem\nCollisionSystem\nAISystem" align="left" width="3" color="#888" position="0 -0.8 0.1"></a-text>            </a-entity>        </a-entity>

        <!-- Info Panel -->
        <a-entity id="info-panel" position="0 1.5 -5" visible="false">            
            <a-plane width="6" height="3" color="#0a0a0f" opacity="0.95" material="shader: flat"
003e</a-plane>            
            
            <a-text id="info-title" value="Info" align="center" width="6" color="#fff" position="0 1 0.1"></a-text>            
            
            <a-text id="info-content" value="Click an object to see details" align="left" width="5" color="#888" position="-2.5 0 0.1"></a-text>        </a-entity>

        <a-sky color="#000205"></a-sky>

    </a-scene>

    <script>
        // Mode management
        const modes = {
            NORMAL: 'Normal',
            NAVMESH: 'NavMesh',
            SPAWNS: 'Spawns',
            PROFILER: 'Profiler',
            ECS: 'ECS'
        };
        
        let currentMode = modes.NORMAL;
        
        // Initialize spawn point interactions
        document.querySelectorAll('.spawn-point').forEach(spawn => {
            const visual = spawn.querySelector('.clickable');
            if (visual) {
                visual.addEventListener('click', () => {
                    showInfo('Spawn Point', 
                        `ID: ${spawn.id}\n` +
                        `Position: ${spawn.getAttribute('position')}\n` +
                        `Respawn Time: 30s\n` +
                        `Max Entities: 5`
                    );
                });
            }
        });
        
        // Initialize loot point interactions
        document.querySelectorAll('.loot-point').forEach(loot => {
            const visual = loot.querySelector('.clickable');
            if (visual) {
                visual.addEventListener('click', () => {
                    showInfo('Loot Cache',
                        `ID: ${loot.id}\n` +
                        `Type: Random\n` +
                        `Respawn: 60s\n` +
                        `Contents: Ammo, Health`
                    );
                });
            }
        });
        
        // Initialize obstacle interactions
        document.querySelectorAll('.obstacle').forEach(obs => {
            obs.classList.add('clickable');
            obs.addEventListener('click', () => {
                const pos = obs.getAttribute('position');
                const dim = obs.getAttribute('geometry');
                showInfo('Obstacle',
                    `Position: ${pos}\n` +
                    `Dimensions: ${dim.width}×${dim.height}×${dim.depth}\n` +
                    `NavMesh: Blocked`
                );
            });
        });
        
        function showInfo(title, content) {
            const panel = document.getElementById('info-panel');
            const titleEl = document.getElementById('info-title');
            const contentEl = document.getElementById('info-content');
            
            if (titleEl) titleEl.setAttribute('value', title);
            if (contentEl) contentEl.setAttribute('value', content);
            if (panel) {
                panel.setAttribute('visible', true);
                setTimeout(() => panel.setAttribute('visible', false), 5000);
            }
        }
        
        // Mode switching
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('current-mode').textContent = mode;
            
            // Update visibility
            document.getElementById('navmesh-overlay').setAttribute('visible', mode === modes.NAVMESH);
            document.getElementById('patrol-paths').setAttribute('visible', mode === modes.NAVMESH);
            document.getElementById('profiler-overlay').setAttribute('visible', mode === modes.PROFILER);
            document.getElementById('ecs-visualizer').setAttribute('visible', mode === modes.ECS);
            
            // Highlight spawns in spawn mode
            document.querySelectorAll('.spawn-point, .loot-point').forEach(el => {
                const shouldHighlight = mode === modes.SPAWNS;
                const visuals = el.querySelectorAll('.clickable, a-octahedron, a-sphere, a-box');
                visuals.forEach(v => {
                    v.setAttribute('emissive', shouldHighlight ? '#ffffff' : '#000000');
                    v.setAttribute('emissiveIntensity', shouldHighlight ? 0.3 : 0);
                });
            });
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'n':
                    setMode(modes.NAVMESH);
                    break;
                case 's':
                    setMode(modes.SPAWNS);
                    break;
                case 'p':
                    setMode(modes.PROFILER);
                    break;
                case 'e':
                    setMode(modes.ECS);
                    break;
                case 't':
                    testNPC();
                    break;
                case 'escape':
                    setMode(modes.NORMAL);
                    break;
            }
        });
        
        // Test NPC spawn
        function testNPC() {
            const spawn = document.getElementById('spawn-enemy-1');
            const pos = spawn.getAttribute('position');
            
            // Create temporary NPC
            const npc = document.createElement('a-entity');
            npc.setAttribute('position', pos);
            
            const body = document.createElement('a-sphere');
            body.setAttribute('radius', 0.5);
            body.setAttribute('color', '#ff3864');
            npc.appendChild(body);
            
            document.querySelector('a-scene').appendChild(npc);
            
            // Animate patrol
            let waypoint = 0;
            const waypoints = [
                { x: -20, z: 0 },
                { x: -10, z: -10 },
                { x: 0, z: -20 },
                { x: -20, z: 0 }
            ];
            
            const interval = setInterval(() => {
                waypoint = (waypoint + 1) % waypoints.length;
                const target = waypoints[waypoint];
                npc.setAttribute('animation', {
                    property: 'position',
                    to: `${target.x} 0 ${target.z}`,
                    dur: 2000
                });
            }, 2000);
            
            // Remove after 10 seconds
            setTimeout(() => {
                clearInterval(interval);
                npc.remove();
            }, 10000);
        }
        
        // Performance profiler simulation
        const profiler = new PerformanceProfiler();
        
        function updateProfiler() {
            // Simulate metrics
            const frame = {
                fps: 55 + Math.floor(Math.random() * 10),
                drawCalls: 40 + Math.floor(Math.random() * 20),
                triangles: 480000 + Math.floor(Math.random() * 100000),
                frameTime: 16 + Math.random() * 4
            };
            
            profiler.record(frame);
            
            // Update DOM
            document.getElementById('fps-counter').textContent = frame.fps;
            document.getElementById('draw-calls').textContent = frame.drawCalls;
            document.getElementById('tri-count').textContent = (frame.triangles / 1000000).toFixed(1);
            document.getElementById('frame-time').textContent = frame.frameTime.toFixed(1);
            document.getElementById('entity-count').textContent = 25 + Math.floor(Math.random() * 5);
            
            // Update 3D meters if visible
            if (currentMode === modes.PROFILER) {
                const fpsValue = document.getElementById('fps-value');
                const fpsBar = document.getElementById('fps-bar');
                if (fpsValue) fpsValue.setAttribute('value', frame.fps);
                if (fpsBar) {
                    const height = (frame.fps / 60) * 2;
                    fpsBar.setAttribute('height', height);
                    fpsBar.setAttribute('position', `0 ${-1 + height/2} 0.1`);
                    fpsBar.setAttribute('color', frame.fps > 55 ? '#00d4aa' : frame.fps > 30 ? '#ffaa00' : '#ff3864');
                }
                
                const drawValue = document.getElementById('draw-value');
                if (drawValue) drawValue.setAttribute('value', frame.drawCalls);
                
                const triValue = document.getElementById('tri-value');
                if (triValue) triValue.setAttribute('value', (frame.triangles / 1000000).toFixed(2) + 'M');
                
                const frameValue = document.getElementById('frame-value');
                if (frameValue) frameValue.setAttribute('value', frame.frameTime.toFixed(1) + 'ms');
            }
        }
        
        // Update profiler every 500ms
        setInterval(updateProfiler, 500);
        
        // Generate patrol path positions
        setTimeout(() => {
            const patrolContainer = document.getElementById('patrol-paths');
            const positions = [
                { x: -20, z: 0 },
                { x: -10, z: -10 },
                { x: 0, z: -15 },
                { x: 10, z: -10 },
                { x: 20, z: 0 }
            ];
            
            positions.forEach((pos, i) => {
                const node = document.createElement('a-sphere');
                node.setAttribute('radius', 0.2);
                node.setAttribute('color', '#6b4ee6');
                node.setAttribute('emissive', '#6b4ee6');
                node.setAttribute('emissiveIntensity', 0.5);
                node.setAttribute('position', `${pos.x} 0.5 ${pos.z}`);
                
                // Animation
                node.setAttribute('animation', {
                    property: 'position.y',
                    dir: 'alternate',
                    to: 0.8,
                    dur: 1000 + i * 200,
                    loop: true
                });
                
                patrolContainer.appendChild(node);
                
                // Connect with lines
                if (i > 0) {
                    const line = document.createElement('a-entity');
                    const prev = positions[i - 1];
                    const midX = (pos.x + prev.x) / 2;
                    const midZ = (pos.z + prev.z) / 2;
                    const dist = Math.sqrt(Math.pow(pos.x - prev.x, 2) + Math.pow(pos.z - prev.z, 2));
                    const angle = Math.atan2(pos.z - prev.z, pos.x - prev.x);
                    
                    line.setAttribute('geometry', {
                        primitive: 'cylinder',
                        radius: 0.05,
                        height: dist
                    });
                    line.setAttribute('material', {
                        color: '#6b4ee6',
                        opacity: 0.5,
                        transparent: true
                    });
                    line.setAttribute('position', `${midX} 0.5 ${midZ}`);
                    line.setAttribute('rotation', `0 ${angle * 180 / Math.PI - 90} 0`);
                    
                    patrolContainer.appendChild(line);
                }
            });
        }, 1000);
        
        // Generate simple navmesh visualization
        setTimeout(() => {
            const navmesh = document.getElementById('navmesh-overlay');
            
            // Create grid of walkable zones
            for (let x = -4; x <= 4; x++) {
                for (let z = -4; z <= 4; z++) {
                    const zone = document.createElement('a-plane');
                    zone.setAttribute('width', 5);
                    zone.setAttribute('height', 5);
                    zone.setAttribute('rotation', '-90 0 0');
                    zone.setAttribute('position', `${x * 5} 0.02 ${z * 5}`);
                    zone.setAttribute('color', (x + z) % 2 === 0 ? '#00d4aa' : '#009970');
                    zone.setAttribute('opacity', 0.2);
                    zone.setAttribute('transparent', true);
                    
                    // Skip obstacle areas
                    const isObstacle = (x === -2 && z === -2) || (x === 2 && z === -1) || (x === 0 && z === 2);
                    
                    if (!isObstacle) {
                        navmesh.appendChild(zone);
                    } else {
                        // Mark as obstacle
                        const obsZone = document.createElement('a-plane');
                        obsZone.setAttribute('width', 5);
                        obsZone.setAttribute('height', 5);
                        obsZone.setAttribute('rotation', '-90 0 0');
                        obsZone.setAttribute('position', `${x * 5} 0.03 ${z * 5}`);
                        obsZone.setAttribute('color', '#ff3864');
                        obsZone.setAttribute('opacity', 0.3);
                        obsZone.setAttribute('transparent', true);
                        navmesh.appendChild(obsZone);
                    }
                }
            }
        }, 500);
    </script>

</body>
</html>
