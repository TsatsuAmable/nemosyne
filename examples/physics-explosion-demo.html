<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nemosyne Physics - Explosion Demo</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/ammo.js"></script>
  <script src="../src/physics/AmmoPhysicsEngine.js"></script>
  <script src="../src/physics/behaviours/physics-behaviours.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 8px;
      max-width: 300px;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      background: #00d4aa;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #00b894; }
    .instructions { font-size: 12px; color: #aaa; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="ui">
    <h3>💥 Explosion Demo</h3>
    <button onclick="triggerExplosion(100)">Small Explosion (100N)</button>
    <button onclick="triggerExplosion(500)">Medium Explosion (500N)</button>
    <button onclick="triggerExplosion(1000)">Big Bang (1000N)</button>
    <button onclick="resetScene()">🔄 Reset</button>
    <p class="instructions">
      Click buttons to trigger explosions.
      Physics bodies scatter realistically.
      Gravity is enabled - watch them fall!
    </p>
    <p id="stats">Bodies: 100</p>
  </div>

  <a-scene physics="debug: false" background="color: #1a1a2e">
    <!-- Lighting -->
    <a-entity light="type: ambient; color: #444"></a-entity>
    <a-entity light="type: directional; color: #fff; intensity: 0.8" position="-1 2 1"></a-entity>
    <a-entity light="type: point; color: #ff6b6b; intensity: 0.5" position="0 5 0"></a-entity>
    
    <!-- Floor -->
    <a-plane position="0 -5 0" rotation="-90 0 0" width="50" height="50" 
               color="#16213e" material="metalness: 0.8; roughness: 0.2">
    </a-plane>
    
    <!-- Grid -->
    <a-entity id="grid-helper"></a-entity>
    
    <!-- Camera -->
    <a-entity position="0 5 15">
      <a-camera look-controls wasd-controls>
        <a-cursor color="#00d4aa" scale="0.5 0.5 0.5"></a-cursor>
      </a-camera>
    </a-entity>
    
    <!-- Physics Container -->
    <a-entity id="physics-container"></a-entity>
    
    <!-- Explosion Center Marker -->
    <a-sphere id="explosion-center" position="0 0 0" radius="0.2" 
                color="#ff6b6b" material="emissive: #ff6b6b; emissiveIntensity: 1"
                animation="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dir: alternate; loop: true">
    </a-sphere>
  </a-scene>

  <script>
    let physics;
    let bodies = [];
    let explosionBehaviour;
    const container = document.getElementById('physics-container');
    const statsEl = document.getElementById('stats');

    // Initialize physics
    async function initPhysics() {
      // Wait for Ammo
      if (typeof Ammo === 'function') {
        await Ammo();
      }

      // Create physics world with gravity
      physics = new AmmoPhysicsEngine({
        gravity: { x: 0, y: -9.81, z: 0 },
        timeStep: 1 / 60,
        maxSubSteps: 10
      });

      await physics.init();
      console.log('[Explosion Demo] Physics initialized');

      // Create explosion behaviour
      explosionBehaviour = new ExplosionBehaviour(null, physics);

      // Create initial grid
      createGrid();

      // Start simulation
      startSimulation();
    }

    function createGrid() {
      // Clear existing
      container.innerHTML = '';
      bodies = [];

      const count = 10;
      const spacing = 1.5;
      const startX = -(count - 1) * spacing / 2;
      const startZ = -(count - 1) * spacing / 2;

      for (let i = 0; i < count; i++) {
        for (let j = 0; j < count; j++) {
          const x = startX + i * spacing;
          const z = startZ + j * spacing;
          const y = Math.random() * 2 - 1; // Slight variation

          const id = `node-${i}-${j}`;
          
          // Create physics body
          const body = physics.createNodeBody(id, { x, y, z }, {
            mass: 1 + Math.random(),
            radius: 0.3,
            restitution: 0.7,  // Bouncy
            friction: 0.3
          });

          // Create visual
          const colors = ['#00d4aa', '#4477ff', '#ff6b6b', '#ffd93d', '#a855f7'];
          const color = colors[Math.floor(Math.random() * colors.length)];

          const entity = document.createElement('a-sphere');
          entity.setAttribute('radius', 0.3);
          entity.setAttribute('position', { x, y, z });
          entity.setAttribute('color', color);
          entity.setAttribute('material', {
            metalness: 0.8,
            roughness: 0.2,
            emissive: color,
            emissiveIntensity: 0.3
          });
          entity.dataset.nodeId = id;

          container.appendChild(entity);
          bodies.push({ id, entity, body });
        }
      }

      statsEl.textContent = `Bodies: ${bodies.length}`;
      console.log(`[Explosion Demo] Created ${bodies.length} bodies`);
    }

    function triggerExplosion(force) {
      const center = { x: 0, y: 0, z: 0 };
      
      // Visual feedback
      const centerMarker = document.getElementById('explosion-center');
      centerMarker.setAttribute('animation__pulse', {
        property: 'scale',
        from: '0.5 0.5 0.5',
        to: '2 2 2',
        dur: 200,
        easing: 'easeOutExpo'
      });

      setTimeout(() => {
        centerMarker.removeAttribute('animation__pulse');
      }, 200);

      // Trigger physics explosion
      explosionBehaviour.trigger(center, force);

      // Wake up all bodies
      bodies.forEach(b => {
        b.body.activate();
      });

      console.log(`[Explosion Demo] Triggered ${force}N explosion`);
    }

    function resetScene() {
      // Reset all bodies to grid positions
      const count = 10;
      const spacing = 1.5;
      const startX = -(count - 1) * spacing / 2;
      const startZ = -(count - 1) * spacing / 2;

      bodies.forEach((b, index) => {
        const i = Math.floor(index / count);
        const j = index % count;
        const x = startX + i * spacing;
        const z = startZ + j * spacing;
        const y = Math.random() * 2 - 1;

        // Reset position
        physics.setBodyPosition(b.id, { x, y, z });
        
        // Reset velocity
        b.body.setLinearVelocity(new Ammo.btVector3(0, 0, 0));
        b.body.setAngularVelocity(new Ammo.btVector3(0, 0, 0));
        
        // Update visual
        b.entity.setAttribute('position', { x, y, z });
      });

      console.log('[Explosion Demo] Scene reset');
    }

    function startSimulation() {
      function update() {
        if (!physics.ready) {
          requestAnimationFrame(update);
          return;
        }

        // Step physics
        physics.stepSimulation(1/60);

        // Sync visuals
        bodies.forEach(b => {
          const pos = physics.getBodyPosition(b.id);
          if (pos) {
            b.entity.setAttribute('position', pos);
          }
        });

        requestAnimationFrame(update);
      }
      
      requestAnimationFrame(update);
    }

    // Start
    initPhysics().catch(console.error);
  </script>
</body>
</html>
