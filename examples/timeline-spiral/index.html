<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemosyne — Timeline Spiral</title>
    
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="../../dist/nemosyne.iife.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; }
        .badge { background: rgba(0, 212, 170, 0.2); border: 1px solid #00d4aa; color: #00d4aa; padding: 4px 12px; border-radius: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 10px; }
        h1 { margin: 0 0 5px; font-size: 24px; font-weight: 300; }
        .subtitle { color: #888; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="badge">Timeline Spiral</div>
        <h1>Nemosyne</h1>
        <p class="subtitle">24-hour activity pattern</p>
    </div>

    <a-scene nemosyne-scene="theme: void">
        
        <a-entity position="0 8 12" rotation="-45 0 0">
            <a-camera look-controls wasd-controls="acceleration: 100">
                <a-cursor color="#00d4aa" scale="0.5 0.5 0.5" raycaster="objects: .clickable"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Spiral timeline -->
        <nemosyne-artefact
            spec-inline='<;{
                "id": "timeline-crystal",
                "geometry": { "type": "octahedron", "radius": 0.4 },
                "material": {
                    "properties": {
                        "color": { "$data": "activity", "$map": "diverging-rdgy" },
                        "emissive": { "$data": "activity", "$map": "diverging-rdgy" },
                        "emissiveIntensity": 0.5,
                        "metalness": 0.9,
                        "roughness": 0.1
                    }
                },
                "transform": {
                    "scale": { "$data": "intensity", "$range": [0.3, 1.2] }
                },
                "behaviours": [
                    { "trigger": "hover", "action": "glow", "params": { "intensity": 2 } },
                    { "trigger": "hover-leave", "action": "glow", "params": { "intensity": 0.5 } },
                    { "trigger": "click", "action": "scale", "params": { "factor": 1.5, "duration": 0.2 } }
                ],
                "labels": {
                    "primary": { "$data": "hour" },
                    "color": "#fff",
                    "position": "above"
                }
            }'
            data-inline='<;{
                "records": [
                    { "hour": "00:00", "activity": 10, "intensity": 0.2 },
                    { "hour": "01:00", "activity": 5, "intensity": 0.1 },
                    { "hour": "02:00", "activity": 2, "intensity": 0.05 },
                    { "hour": "03:00", "activity": 0, "intensity": 0.02 },
                    { "hour": "04:00", "activity": 3, "intensity": 0.06 },
                    { "hour": "05:00", "activity": 15, "intensity": 0.3 },
                    { "hour": "06:00", "activity": 45, "intensity": 0.9 },
                    { "hour": "07:00", "activity": 78, "intensity": 1.5 },
                    { "hour": "08:00", "activity": 92, "intensity": 1.8 },
                    { "hour": "09:00", "activity": 85, "intensity": 1.7 },
                    { "hour": "10:00", "activity": 88, "intensity": 1.75 },
                    { "hour": "11:00", "activity": 90, "intensity": 1.8 },
                    { "hour": "12:00", "activity": 75, "intensity": 1.5 },
                    { "hour": "13:00", "activity": 65, "intensity": 1.3 },
                    { "hour": "14:00", "activity": 82, "intensity": 1.6 },
                    { "hour": "15:00", "activity": 88, "intensity": 1.75 },
                    { "hour": "16:00", "activity": 70, "intensity": 1.4 },
                    { "hour": "17:00", "activity": 55, "intensity": 1.1 },
                    { "hour": "18:00", "activity": 40, "intensity": 0.8 },
                    { "hour": "19:00", "activity": 60, "intensity": 1.2 },
                    { "hour": "20:00", "activity": 45, "intensity": 0.9 },
                    { "hour": "21:00", "activity": 30, "intensity": 0.6 },
                    { "hour": "22:00", "activity": 18, "intensity": 0.36 },
                    { "hour": "23:00", "activity": 12, "intensity": 0.24 }
                ]
            }'>
        </nemosyne-artefact>

        <!-- Spiral path line -->
        <a-entity id="spiral-line"></a-entity>

        <!-- Central core -->
        <a-sphere 
            position="0 0 0" 
            radius="0.5" 
            color="#1a1a2e"
            emissive="#1a1a2e"
            emissive-intensity="0.5"
            material="metalness: 0.8; roughness: 0.2"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear"
        >
        </a-sphere>

        <a-sky color="#000205"></a-sky>

    </a-scene>

    <script>
        // Calculate spiral positions
        const scene = document.querySelector('a-scene');
        scene.addEventListener('nemosyne-loaded', (e) => {
            const nodes = document.querySelectorAll('.clickable');
            const spiralRadius = 3;
            const heightStep = 0.3;
            
            nodes.forEach((node, i) => {
                const angle = (i / nodes.length) * Math.PI * 4; // 2 full rotations
                const radius = spiralRadius * (1 - i / nodes.length * 0.3);
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = i * heightStep;
                
                node.setAttribute('position', `${x} ${y} ${z}`);
                node.setAttribute('rotation', `0 ${-angle * 180 / Math.PI} 0`);
            });

            // Draw connecting path
            const container = document.querySelector('#spiral-line');
            for (let i = 0; i < nodes.length - 1; i++) {
                const posA = nodes[i].getAttribute('position');
                const posB = nodes[i + 1].getAttribute('position');
                
                const line = document.createElement('a-entity');
                const dist = Math.sqrt(
                    Math.pow(posB.x - posA.x, 2) +
                    Math.pow(posB.y - posA.y, 2) +
                    Math.pow(posB.z - posA.z, 2)
                );
                
                line.setAttribute('geometry', {
                    primitive: 'cylinder',
                    radius: 0.02,
                    height: dist
                });
                line.setAttribute('material', {
                    color: '#00d4aa',
                    opacity: 0.4,
                    transparent: true,
                    emissive: '#00d4aa',
                    emissiveIntensity: 0.2
                });
                
                const midX = (posA.x + posB.x) / 2;
                const midY = (posA.y + posB.y) / 2;
                const midZ = (posA.z + posB.z) / 2;
                line.setAttribute('position', `${midX} ${midY} ${midZ}`);
                
                line.object3D.lookAt(posB.x, posB.y, posB.z);
                line.object3D.rotateX(Math.PI / 2);
                
                container.appendChild(line);
            }
        });
    </script>

</body>
</html>
